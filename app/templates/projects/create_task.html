<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание задачи — {{ project.name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/create_task.css') }}">
</head>
<body>
<div class="create-task-page">
    <div class="create-task-container">
        <div class="create-task-card">
            <div class="create-task-header">
                <a href="{{ url_for('project.view', project_id=project.id) }}" class="back-btn">
                    <i class="bi bi-arrow-left"></i> Назад к проекту
                </a>
                <h1>Создание задачи</h1>
                <p>Проект: <strong>{{ project.name }}</strong></p>
            </div>
            
            <form method="post" class="create-task-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="title">Название задачи <span class="required">*</span></label>
                        <input type="text" id="title" name="title" placeholder="Введите название задачи" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="description">Описание задачи</label>
                        <textarea id="description" name="description" rows="4" placeholder="Подробное описание задачи..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="priority">Приоритет</label>
                        <select id="priority" name="priority">
                            <option value="low">🟢 Низкий</option>
                            <option value="medium" selected>🟡 Средний</option>
                            <option value="high">🔴 Высокий</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="deadline">Срок выполнения</label>
                        <input type="date" id="deadline" name="deadline">
                    </div>
                    
                    <div class="form-group">
                        <label for="assignee_id">Исполнитель</label>
                        <select id="assignee_id" name="assignee_id">
                            <option value="">Не назначен</option>
                            {% for worker in workers %}
                                <option value="{{ worker.id }}">{{ worker.last_name }} {{ worker.first_name }} {{ worker.patronymic or '' }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-check-lg"></i> Создать задачу
                    </button>
                    <a href="{{ url_for('project.view', project_id=project.id) }}" class="btn-cancel">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
