{% extends 'main/base.html' %}

{% block title %}Создание проекта{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create_project.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}

{% block content %}
<div class="create-project-page">
    <div class="create-project-container">
        <div class="create-project-card">
            <div class="create-project-header">
                <a href="{{ url_for('work.index') }}" class="back-btn">
                    <i class="bi bi-arrow-left"></i> Назад
                </a>
                <h1>Создание нового проекта</h1>
                <p>Заполните информацию о проекте</p>
            </div>
            
            <form method="post" class="create-project-form" action="{{ url_for('project.create') }}">
                {{ form.csrf_token if form else '' }}
                
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="name">Название проекта <span class="required">*</span></label>
                        <input type="text" id="name" name="name" placeholder="Введите название проекта" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="address">Адрес объекта <span class="required">*</span></label>
                        <input type="text" id="address" name="address" placeholder="г. Хабаровск, ул. Примерная, д. 1" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="description">Описание проекта</label>
                        <textarea id="description" name="description" rows="4" placeholder="Краткое описание проекта, особенности, требования..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="start_date">Дата начала <span class="required">*</span></label>
                        <input type="date" id="start_date" name="start_date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="end_date">Плановая дата окончания</label>
                        <input type="date" id="end_date" name="end_date">
                    </div>
                    
                    <div class="form-group">
                        <label for="budget">Бюджет (₽)</label>
                        <input type="number" id="budget" name="budget" step="0.01" placeholder="0.00">
                    </div>
                    
                    <div class="form-group">
                        <label for="priority">Приоритет</label>
                        <select id="priority" name="priority">
                            <option value="low">🟢 Низкий</option>
                            <option value="medium" selected>🟡 Средний</option>
                            <option value="high">🔴 Высокий</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">Статус</label>
                        <select id="status" name="status">
                            <option value="planning">📋 Планирование</option>
                            <option value="active">🔄 Активный</option>
                            <option value="hold">⏸️ Приостановлен</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="manager_id">Менеджер проекта</label>
                        <select id="manager_id" name="manager_id">
                            <option value="">Не назначен</option>
                            {% for manager in managers %}
                                <option value="{{ manager.id }}">{{ manager.last_name }} {{ manager.first_name }} {{ manager.patronymic or '' }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-check-lg"></i> Создать проект
                    </button>
                    <a href="{{ url_for('work.index') }}" class="btn-cancel">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
