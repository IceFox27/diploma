<header class="header" id="mainHeader">
    <div class="container-header">
        <a href="{{ url_for('main.index') }}" class="header-logo" id="logo">🏗️ МОЙ <span class="orange">ДОМ ДВ</span></a>
        <div class="header-nav">
            <a href="#">О компании</a>
            <a href="#">Портфолио</a>
            <a href="#">Услуги</a>
            <a href="#">Работа</a>
            <a href="#">Контакты</a>
            <a href="#">Блог</a>
        </div>
        
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('employee.profile') }}" class="header-profile">
                {% if current_user.avatar %}
                    <img src="{{ url_for('static', filename='upload/' + current_user.avatar) }}" 
                         alt="{{ current_user.first_name }} {{ current_user.last_name }}" 
                         class="profile-avatar"
                         title="{{ current_user.first_name }} {{ current_user.last_name }}">
                {% else %}
                    <div class="profile-icon" title="{{ current_user.first_name }} {{ current_user.last_name }}">
                        {{ current_user.first_name[0] }}{{ current_user.last_name[0] }}
                    </div>
                {% endif %}
            </a>
        {% else %}
            <a href="{{ url_for('employee.login') }}" class="header-login" id="loginBtn">Войти</a>
        {% endif %}
    </div>
</header>
